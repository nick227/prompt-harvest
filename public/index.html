<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Image Generator</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <link rel="icon" href="/images/favicon.png" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        custom: '#123456',
                    },
                },
            },
        }
    </script>

</head>

<body>
    <button type="button" class="btn-scroll-top">top</button>

    <section class="prompt">
        <div class="row">
            <div class="col">
                <div class="topbar">
                    <div class="row full-width">
                        <div id="authentication" class="no-wrap"><a href="/login.html">login</a>
                        </div>
                    </div>
                </div>
                <div class="row provider-list toggle-menu">
                    <div class="row full-width">

                        <input type="number" name="maxNum" style="width: 35px" placeholder="max" />&nbsp;
                        <label>
                            <input type="checkbox" name="auto-generate" /> auto
                        </label> &nbsp;
                        <label>
                            <select style="width: 55px" name="guidance-bottom">
                                <option>bottom</option>

                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="17">17</option>
                                <option value="18">18</option>
                                <option value="19">19</option>
                                <option value="20">20</option>
                            </select>
                        </label>
                        <label>
                            <select style="width: 55px" name="guidance-top">
                                <option>top</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="17">17</option>
                                <option value="18">18</option>
                                <option value="19">19</option>
                                <option value="20">20</option>
                            </select>
                        </label>
                    </div>
                    <label for="flux"><input type="checkbox" value="flux"
                                id="flux"
                                name="providers" />Flux</label>
                    <label for="dalle"><input
                                type="checkbox"
                                value="dalle"
                                id="dalle"
                                name="providers" />Dalle3</label>
                    <label for="juggernaut"><input type="checkbox"
                                value="juggernaut" id="juggernaut"
                                name="providers" />Juggernaut</label>
                    <label for="juggernautReborn"><input type="checkbox"
                                value="juggernautReborn" id="juggernautReborn"
                                name="providers" />Juggernaut Reborn</label>
                    <label for="redshift"><input type="checkbox"
                                value="redshift" id="redshift"
                                name="providers" />Red Shift</label>
                    <label for="absolute"><input type="checkbox"
                                value="absolute" id="absolute"
                                name="providers" />Absolute
                            Reality</label>
                    <label for="realisticvision"><input type="checkbox"
                                value="realisticvision" id="realisticvision"
                                name="providers" />Realistic Vision</label>
                    <label for="icbinp"><input type="checkbox"
                                value="icbinp" id="icbinp"
                                name="providers" />Icbinp</label>
                    <label for="icbinp_seco"><input type="checkbox"
                                value="icbinp_seco" id="icbinp_seco"
                                name="providers" />Icbinp2</label>
                    <label for="hasdx"><input type="checkbox" value="hasdx"
                                id="hasdx" name="providers" />Hasdx</label>
                    <label for="dreamshaper"><input type="checkbox"
                                value="dreamshaper" id="dreamshaper"
                                name="providers" />Dreamshaper</label>
                    <label for="nightmareshaper"><input type="checkbox"
                                value="nightmareshaper" id="nightmareshaper"
                                name="providers" />Nightmare Shaper</label>
                    <label for="openjourney"><input type="checkbox"
                                value="openjourney" id="openjourney"
                                name="providers" />Open
                            Journey</label>
                    <label for="analogmadness"><input type="checkbox"
                                value="analogmadness" id="analogmadness"
                                name="providers" />Analog Madeness</label>
                    <label for="portraitplus"><input type="checkbox"
                                value="portraitplus" id="portraitplus"
                                name="providers" />Portrait Plus</label>
                    <label for="tshirt"><input type="checkbox"
                                value="tshirt" id="tshirt"
                                name="providers" />Tshirt Design</label>
                    <label for="abyssorange"><input type="checkbox"
                                value="abyssorange" id="abyssorange"
                                name="providers" />Abyss
                            Orange</label>
                    <label for="cyber"><input type="checkbox" value="cyber"
                                id="cyber" name="providers" />Cyber Real</label>
                    <label for="disco"><input type="checkbox" value="disco"
                                id="disco" name="providers" />Disco</label>
                    <label for="synthwave"><input type="checkbox"
                                value="synthwave" id="synthwave"
                                name="providers" />Synthwave</label>
                    <label for="lowpoly"><input type="checkbox"
                                value="lowpoly" id="lowpoly"
                                name="providers" />Low Poly</label>
                    <label for="bluepencil"><input type="checkbox"
                                value="bluepencil" id="bluepencil"
                                name="providers" />Blue
                            Pencil</label>
                    <label for="ink"><input type="checkbox" value="ink"
                                id="ink" name="providers" />Ink Punk</label>
                    <label for="all"><input type="checkbox" id="all"
                                class="all-providers" />all</label>

                </div>
                <div class="toggle-menu extra-tools">
                    <div class="row v-align-center">
                        <label><input type="checkbox" name="autoDownload" />
                                download</label> &nbsp;
                        <label> <input type="checkbox" name="mixup" /> mixup
                            </label> &nbsp;
                        <label> <input type="checkbox" name="mashup" />
                                mashup
                            </label>
                    </div>
                    <div class="row full-width">
                        <input type="text" id="multiplier" placeholder="Multiplier text - Added between comma clauses" class="w-full" />
                    </div>

                    <div class="row full-width v-align-center">
                        <input type="text" placeholder="search term" name="search_term" id="search_term" class="w-1/3 mr-2" />
                        <input type="text" placeholder="replace term" name="replace_term" id="replace_term" class="w-1/3 mr-2" />
                        <button class="btn-replace">Replace</button>
                    </div>
                    <div class="row v-align-center">
                        <a class="mr-4" href="/terms.html" target="_blank"><i class="fa-solid fa-book"></i></a>
                        <button class="insert-variable mr-4">+ Variable</button>
                        <div class="chips-variables row"></div>
                    </div>
                </div>
                <textarea id="prompt-textarea"></textarea>
                <div class="row full-width">
                    <button class="btn-generate mt-4">START</button>
                </div>
                <ul id="matches" class="matches"></ul>
            </div>
            <div class="col">

                <div class="prompts">
                    <div class="row w-full">
                        <label class>
                                <input type="checkbox" checked
                                    class="prompt-view-switch" />
                                grid
                            </label>
                        <div class="search">
                            <input type="text" name="image-search" placeholder="search" />
                        </div>
                    </div>
                    <ul class="prompt-output"></ul>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.0.2/interact.min.js" integrity="sha512-Ipef/NhGC7SlCer4041clfWKsriVhnGMcS15cVrl9j/NFtNmqeK28tbfOFwASlSfy4j8XjcpVw4HXvTvzgA8rA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <script src=" https://cdn.jsdelivr.net/npm/sweetalert2@11.10.6/dist/sweetalert2.all.min.js "></script>
    <link href=" https://cdn.jsdelivr.net/npm/sweetalert2@11.10.6/dist/sweetalert2.min.css " rel="stylesheet" />

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/helpers/toggleFullScreenThisImage.js"></script>
    <script src="js/helpers/handleHelpLinkClick.js"></script>
    <script src="js/helpers/addPromptToOutput.js"></script>
    <script src="js/setup/setupRating.js"></script>
    <script src="js/setup/setupScrollLoading.js"></script>
    <script src="js/setup/setupScrollTopBar.js"></script>
    <script src="js/setup/setupCustomVariables.js"></script>
    <script src="js/setup/textAreaHelpers.js"></script>
    <script src="js/setup/setupTextArea.js"></script>
    <script src="js/setup/setupGuidance.js"></script>
    <script src="js/setup/setupImageSearch.js"></script>
    <script src="js/setup/setupToggleView.js"></script>
    <script src="js/setup/setupFeed.js"></script>
    <script src="js/images.js"></script>
    <script type="module" src="js/script.js"></script>

</body>

</html>
