<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Prompt - Image and Prompt Harvesting</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png" type="image/png">
    <script src=" https://cdn.jsdelivr.net/npm/sweetalert2@11.10.6/dist/sweetalert2.all.min.js "></script>
<link href=" https://cdn.jsdelivr.net/npm/sweetalert2@11.10.6/dist/sweetalert2.min.css " rel="stylesheet">
</head>

<body>

<div class="align-center masthead">
    <h6 class="title">Power Prompt</h6>
</div>
    <div class="modal hidden"></div>
    <div id="authentication"></div>
    <div class="stats  align-right ">image count: <span id="image-count"></span>
    </div>

    <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="nicholasjay" data-color="#FFDD00" data-emoji="☕"  data-font="Cookie" data-text="Buy me a coffee" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#ffffff" ></script>
        
    <section class="prompt">
        <div class="row">
            <div class="col">
                <h3>Prompt Builder: <a class="link help">(?)</a></h3>
                    <div class="row">
                        <label for="dalle"><input type="checkbox" value="dalle" id="dalle" name="providers" />Dalle3</label>
                        <label for="juggernaut"><input type="checkbox" value="juggernaut" id="juggernaut" name="providers" />Juggernaut</label>
                        <label for="absolute"><input type="checkbox" value="absolute" id="absolute" name="providers" />Absolute Reality</label>
                        <label for="tshirt"><input type="checkbox" value="tshirt" id="tshirt" name="providers" />Tshirt Design</label>
                        <label for="lowpoly"><input type="checkbox" value="lowpoly" id="lowpoly" name="providers" />Low Poly</label>
                        <label for="cyber"><input type="checkbox" value="cyber" id="cyber" name="providers" />Cyber Real</label>
                        <label for="disco"><input type="checkbox" value="disco" id="disco" name="providers" />Disco</label>
                        <label for="synthwave"><input type="checkbox" value="synthwave" id="synthwave" name="providers" />Synthwave</label>
                        <label for="ink"><input type="checkbox" value="ink" id="ink" name="providers" />Ink Punk</label>
                        <label for="all"><input type="checkbox" class="all-providers" />all</label>
                    </div>
                    <div class="row v-align-center">
                    <button class="btn-convert">convert</button>
                    <input type="number" name="maxNum" style="width: 55px;" placeholder="max" />
                    <label>
                        <input type="checkbox" name="auto-generate" /> auto
                    </label>
                    <label>
                        <input type="checkbox" name="mixup" /> mixup
                    </label>
                    <label>
                        <select style="width: 55px;" name="guidance-bottom">
                            <option>guidance bottom</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                            <option value="14">14</option>
                            <option value="15">15</option>
                            <option value="16">16</option>
                            <option value="17">17</option>
                            <option value="18">18</option>
                            <option value="19">19</option>
                            <option value="20">20</option>
                        </select> 
                    </label>
                    <label>
                        <select style="width: 55px;" name="guidance-top">
                            <option>guidance top</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                            <option value="14">14</option>
                            <option value="15">15</option>
                            <option value="16">16</option>
                            <option value="17">17</option>
                            <option value="18">18</option>
                            <option value="19">19</option>
                            <option value="20">20</option>
                        </select> 
                    </label>
                    <div class="insert-comma">Add comma</div>
                    </div>
                    

                <textarea id="prompt-textarea" rows="10"></textarea>
                <ul id="matches" class="matches"></ul>
                <input type="text" id="multiplier" placeholder="multiplier text" />
                <button class="btn-generate">Let's Go!</button>
            </div>
            <div class="col">
                <input type="text" id="filterTypes" placeholder="filter" />
                <ul class="word-types"></ul>
            

            </div>
        </div>
    </section>

    <section class="images">
        <ul class="image-output"></ul>
    </section>


    <section class="term-results">
        <h3>Find Terms</h3>
        <div class="">
            <div class="term-container">
                <input type="text" id="term" placeholder="search">
            </div>
            <button class="find">find</button>
            <button class="clear">clear</button>
        </div>
        <div class="loading hidden">
            <div class="message">Working on it...</div>
        </div>
        <div class="term-results"></div>
    </section>

    <script src="user.js"></script>
    <script src="tools.js"></script>

    <script src="addPromptToOutput.js"></script>
    <script src="setupStatsBar.js"></script>
    <script src="setupModal.js"></script>
    <script src="setupSearchTerm.js"></script>
    <script src="setupWordTypeSection.js"></script>
    <script src="setupFeed.js"></script>
    <script src="script.js"></script>
</body>

</html>
