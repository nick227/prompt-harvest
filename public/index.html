<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoImage - AI Image Generator</title>
    <link rel="stylesheet" href="css/optimized.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <link rel="icon" href="/images/favicon.png" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        custom: '#123456',
                    },
                },
            },
        }
    </script>

</head>

<body class="bg-gray-800 text-gray-200 w-full min-h-screen">
    <!-- Scroll to Top Button -->
    <button type="button" class="fixed bottom-4 right-4 bg-gray-700 text-white px-4 py-2 rounded-md hover:bg-gray-600 transition-colors z-50" aria-label="Scroll to top">top</button>

    <main class="flex-col gap-4 h-full max-w-[1020px] mx-auto">
        <!-- Controls -->
        <div class="w-full mb-4 flex flex-col gap-4 min-w-0">

            <!-- Settings Row -->
            <div class="flex items-center gap-2 text-sm flex-wrap">
                <div class="w-full flex items-center gap-2">
                    <label class="flex items-center gap-1 cursor-pointer auto-label">
                            <input type="checkbox" name="auto-generate" />
                            <span>Auto</span>
                        </label>
                    <input type="number" name="maxNum" class="w-24 bg-white text-gray-800 px-2 py-1 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="max" min="1" max="10" value="3" />

                    <h6 class="ml-8">guidance</h6>
                    <label class="flex items-center gap-1">
                            <select
                                class="w-14 bg-white text-gray-800 px-2 py-1 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                name="guidance-bottom">
                                <option value>bottom</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="17">17</option>
                                <option value="18">18</option>
                                <option value="19">19</option>
                                <option value="20">20</option>
                            </select>
                        </label>
                    <label class="flex items-center gap-1">
                            <select
                                class="w-14 bg-white text-gray-800 px-2 py-1 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                name="guidance-top">
                                <option value>top</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="17">17</option>
                                <option value="18">18</option>
                                <option value="19">19</option>
                                <option value="20">20</option>
                            </select>
                        </label>

                    <label class="flex items-center gap-1 cursor-pointer ml-8">
                            <input type="checkbox" name="autoDownload" />
                            <span>download</span>
                        </label>
                    <label class="flex items-center gap-1 cursor-pointer">
                            <input type="checkbox" name="mixup" />
                            <span>mixup</span>
                        </label>
                    <label class="flex items-center gap-1 cursor-pointer">
                            <input type="checkbox" name="mashup" />
                            <span>mashup</span>
                        </label>

                    <input type="text" id="multiplier" placeholder="Multiplier" class="w-24 bg-white text-gray-800 px-2 py-1 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />

                    <input type="text" placeholder="search" name="search_term" id="search_term" class="w-20 bg-white text-gray-800 px-2 py-1 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    <input type="text" placeholder="replace" name="replace_term" id="replace_term" class="w-20 bg-white text-gray-800 px-2 py-1 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    <button class="btn-replace bg-gray-700 text-white px-3 py-1 rounded text-sm hover:bg-gray-600 transition-colors whitespace-nowrap">Replace</button>

                </div>
            </div>

            <!-- Provider List -->
            <div id="provider-list" class="flex gap-2 text-sm max-h-48 overflow-y-auto pt-2 pb-4">
                <!-- Providers will be populated by JavaScript -->
            </div>

            <!-- Tools Section -->
            <div class="flex items-center gap-3 text-sm flex-wrap"> </div>

            <!-- Prompt Textarea -->
            <textarea id="prompt-textarea" class="w-full bg-white text-gray-800 px-3 py-2 rounded resize-none focus:outline-none focus:ring-2 focus:ring-blue-500" rows="6" placeholder="Enter your prompt here..."></textarea>

            <!-- Generate Button -->
            <div class="w-full">
                <button type="button" class="btn-generate w-full bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-800">START</button>
            </div>

            <!-- Matches -->
            <ul id="matches" class="matches flex flex-wrap gap-2 max-h-32 overflow-y-auto"></ul>
        </div>

        <!-- Image Display -->
        <div class="w-full flex flex-col min-w-0">
            <div class="flex flex-col h-full">
                <!-- Controls Bar -->
                <div class="flex items-center justify-between mb-4 flex-wrap gap-4">
                    <div class="search flex-1 max-w-xs">
                        <input type="text" name="image-search" placeholder="search" class="w-full bg-white text-gray-800 px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div class="owner-filter flex items-center gap-2 flex-wrap">
                        <!-- Owner Filter -->
                        <label class="owner-btn bg-gray-700 text-white px-3 py-1 rounded hover:bg-gray-600 transition-colors" data-owner="site">
                            <input type="radio" name="owner" value="site"> Site</label>
                        <label class="owner-btn bg-gray-700 text-yellow-400 px-3 py-1 rounded hover:bg-gray-600 transition-colors" data-owner="1">
                            <input type="radio" name="owner" value="user"> Mine</label>
                        <!-- Rating Filter -->
                        <span class="text-sm">Rating:</span>
                        <div id="rating-dropdown"></div>
                    </div>
                </div>

                <!-- Image Grid -->
                <ul class="prompt-output flex flex-wrap gap-2 pb-16 h-full overflow-y-auto"></ul>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <!-- Header Component -->
    <script src="js/components/header-component.js"></script>

    <!-- Authentication Component -->
    <script src="js/components/auth-component.js"></script>

    <!-- Transaction Stats Component -->
    <script src="js/components/transaction-stats-component.js"></script>

    <!-- Core modules -->
    <script src="js/core/constants.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/api-service.js"></script>

    <!-- Services -->
    <script src="js/services/stats-service.js"></script>

    <!-- Image Component (Separated Architecture) -->
    <script src="js/components/image/image-ui.js"></script>
    <script src="js/components/image/image-events.js"></script>
    <script src="js/components/image/image-data.js"></script>
    <script src="js/components/image/image-manager.js"></script>
    <script src="js/components/image-component.js"></script>

    <!-- Component modules -->
    <script src="js/components/multiselect-dropdown.js"></script>

    <!-- Feature modules -->
    <script src="js/modules/textarea.js"></script>
    <script src="js/modules/ui.js"></script>
    <script src="js/modules/search.js"></script>
    <script src="js/modules/feed/feed-manager.js"></script>
    <script src="js/modules/guidance/guidance-manager.js"></script>
    <script src="js/modules/rating/rating-manager.js"></script>
    <script src="js/modules/stats/stats-manager.js"></script>
    <script src="js/modules/providers/provider-manager.js"></script>

    <!-- Core modules -->
    <script src="js/user.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/modules/images.js"></script>

    <!-- Generation Component (Separated Architecture) -->
    <script src="js/components/generation/generation-ui.js"></script>
    <script src="js/components/generation/generation-events.js"></script>
    <script src="js/components/generation/generation-data.js"></script>
    <script src="js/components/generation/generation-manager.js"></script>
    <script src="js/components/generation/generation-component.js"></script>

    <!-- Main application loader -->
    <script src="js/app.js"></script>



</body>

</html>
