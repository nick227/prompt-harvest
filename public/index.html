<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Prompt - Image and Prompt Harvesting</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="row">
        <div class="align-center">
            <img class="logo" src="logo.png" />
        </div>
        <div id="authentication"></div>
    </section>
    <div class="modal hidden">
        <ul id="matches" class="matches"></ul>
    </div>
    <div class="stats row align-right hidden">image count: <span id="image-count"></span></div>
<div class="main ">
    <section class="prompt">
        <div class="row">
            <div class="col col-4">
                <h3>Prompt Builder:</h3>

                <div class="row align-right v-align-center">
                    <button class="btn-convert">convert</button>
                    <input type="number" name="maxNum" style="width: 55px;" placeholder="max" />
                    <label>
                        <input type="checkbox" name="auto-generate" />auto
                    </label>
                    <label>
                        <input type="checkbox" name="mixup" />mixup
                    </label>
                </div>

                <textarea id="prompt-textarea" rows="10"></textarea>
                <div>
                    <input type="text" id="multiplier" style="width:93%;" placeholder="multiplier text" />
                </div>
                <div class="row align-right">
                    <form id="provider-options" class="row">
                        
                        <label for="dalle">
                            <input type="checkbox" value="dalle" id="dalle" name="providers" />Dalle3</label>
                        <label for="juggernaut">
                            <input type="checkbox" value="juggernaut" id="juggernaut" name="providers" />Juggernaut</label>
                        <label for="absolute">
                            <input type="checkbox" value="absolute" id="absolute" name="providers" />Absolute Reality</label>
                    </form>
                </div>
                <div class="row">
                    <button class="btn-generate">Let's Go!</button>
                </div>
            </div>
            <div class="col col-1"></div>
            <div class="col col-5">
                <h3>Prompts:</h3>
                <div class="prompts">
                    <ul class="prompt-output"></ul>
                </div>
            </div>
        </div>
    </section>
    <section class="images">
        <h3>Images:</h3>
        <ul class="image-output"></ul>
    </section>
    <section class="term-results">
        <h3>Search Types:</h3>
        <div class="">
            <input type="text" id="term" placeholder="find term">
            <button class="find">find</button>
            <button class="clear">clear</button>
        </div>
        <div class="loading hidden">
            <div class="message">Working on it...</div>
        </div>
    </section>

    <section class="word-types">
        <h3>All Types:</h3>
        <input type="text" id="filterTypes" placeholder="filter results" />
        <ul class="word-types"></ul>
    </section>
</div>



    <script src="user.js"></script>
    <script src="updateModal.js"></script>
    <script src="setupWordTypeSection.js"></script>
    <script src="setupStatsBar.js"></script>
    <script src="setupModal.js"></script>
    <script src="setupTextArea.js"></script>
    <script src="setupSearchTerm.js"></script>
    <script src="setupFeed.js"></script>
    <script src="script.js"></script>
</body>

</html>
