    <link rel="stylesheet" href="css/style.css">

<body>

<div class="align-center" style="width:100%;">
    <a href="/"><h6 class="title">Power Prompt</h6></a>
    <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="nicholasjay" data-color="#FFDD00" data-emoji="☕"  data-font="Cookie" data-text="Buy me a coffee" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#ffffff" ></script>
</div>

    <div id="authWidget">
        <form id="loginForm" class="authForm">
            <h2>Login</h2>
            <input type="email" name="email" id="loginEmail" placeholder="Email">
            <input type="password" name="password" id="loginPassword" placeholder="Password">
            <button type="submit">Submit</button>
            <a href="#" id="showRegisterForm">Register</a>
        </form>

        <form id="registerForm" class="authForm" style="display: none;">
            <h2>Register</h2>
            <input type="email" name="email" id="registerEmail" placeholder="Email">
            <input type="password" name="password" id="registerPassword" placeholder="Password">
            <button type="submit">Submit</button>
            <a href="#" id="showLoginForm">Login</a>
        </form>
    </div>

    <script src="js/user.js"></script>
    <script>   

        checkUser().then(user => {
            if (user) {
                renderUserUI(user.email);
    
            } else {
                console.log('No user', user);
            }
        });
       
    </script>
</body>
