<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Debug Test - AutoImage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/optimized.css">
    <link rel="icon" href="images/favicon.png" type="image/png">
</head>
<body class="bg-gray-800 text-gray-200 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center">🔐 Authentication Debug Test</h1>

        <!-- Debug Info -->
        <div class="bg-gray-700 p-6 rounded-lg mb-8">
            <h2 class="text-xl font-semibold mb-4">Debug Information</h2>
            <div id="debug-info" class="space-y-2 text-sm">
                <p>Loading...</p>
            </div>
        </div>

        <!-- Test Controls -->
        <div class="bg-gray-700 p-6 rounded-lg mb-8">
            <h2 class="text-xl font-semibold mb-4">Test Controls</h2>
            <div class="flex gap-4 flex-wrap">
                <button id="test-profile-btn" class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700 transition-colors">
                    <i class="fas fa-user mr-2"></i>
                    Test Profile Endpoint
                </button>

                <button id="clear-token-btn" class="bg-red-600 text-white px-6 py-3 rounded hover:bg-red-700 transition-colors">
                    <i class="fas fa-trash mr-2"></i>
                    Clear Token
                </button>

                <button id="check-token-btn" class="bg-green-600 text-white px-6 py-3 rounded hover:bg-green-700 transition-colors">
                    <i class="fas fa-search mr-2"></i>
                    Check Token
                </button>
            </div>
        </div>

        <!-- Test Results -->
        <div class="bg-gray-700 p-6 rounded-lg">
            <h2 class="text-xl font-semibold mb-4">Test Results</h2>
            <div id="test-results" class="text-sm">
                <p class="text-gray-400">Click "Test Profile Endpoint" to see results...</p>
            </div>
        </div>
    </div>

    <!-- Load required services -->
    <script src="js/core/api-service.js"></script>

    <script>
        // Debug information
        function updateDebugInfo() {
            const debugDiv = document.getElementById('debug-info');
            const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');

            debugDiv.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <strong>Token Available:</strong> ${token ? 'Yes' : 'No'}
                    </div>
                    <div>
                        <strong>Token Length:</strong> ${token ? token.length : 'N/A'}
                    </div>
                    <div>
                        <strong>Token Preview:</strong> ${token ? token.substring(0, 30) + '...' : 'N/A'}
                    </div>
                    <div>
                        <strong>Current URL:</strong> ${window.location.href}
                    </div>
                    <div>
                        <strong>API Service:</strong> ${window.userApi ? 'Available' : 'Not Available'}
                    </div>
                    <div>
                        <strong>User API Auth:</strong> ${window.userApi?.isAuthenticated() ? 'Yes' : 'No'}
                    </div>
                </div>
            `;
        }

        // Test profile endpoint
        document.getElementById('test-profile-btn').addEventListener('click', async () => {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<p class="text-blue-400">🔄 Testing profile endpoint...</p>';

            try {
                if (!window.userApi) {
                    throw new Error('User API not available');
                }

                const response = await window.userApi.getProfile();
                resultsDiv.innerHTML = `
                    <div class="bg-green-900 p-4 rounded">
                        <h3 class="font-semibold text-green-200">✅ Profile Request Successful!</h3>
                        <pre class="text-green-200 text-xs mt-2 overflow-auto">${JSON.stringify(response, null, 2)}</pre>
                    </div>
                `;

            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="bg-red-900 p-4 rounded">
                        <h3 class="font-semibold text-red-200">❌ Profile Request Failed</h3>
                        <p class="text-red-200">Error: ${error.message}</p>
                        <p class="text-red-200 text-xs mt-2">Status: ${error.status || 'Unknown'}</p>
                    </div>
                `;
            }
        });

        // Clear token
        document.getElementById('clear-token-btn').addEventListener('click', () => {
            localStorage.removeItem('authToken');
            sessionStorage.removeItem('authToken');
            updateDebugInfo();
            document.getElementById('test-results').innerHTML = '<p class="text-gray-400">Token cleared. Click "Test Profile Endpoint" to see results...</p>';
        });

        // Check token
        document.getElementById('check-token-btn').addEventListener('click', () => {
            const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
            const resultsDiv = document.getElementById('test-results');

            if (token) {
                try {
                    // Decode JWT payload (without verification)
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    resultsDiv.innerHTML = `
                        <div class="bg-blue-900 p-4 rounded">
                            <h3 class="font-semibold text-blue-200">🔍 Token Analysis</h3>
                            <div class="text-blue-200 text-xs mt-2">
                                <p><strong>User ID:</strong> ${payload.userId}</p>
                                <p><strong>Issued At:</strong> ${new Date(payload.iat * 1000).toLocaleString()}</p>
                                <p><strong>Expires At:</strong> ${new Date(payload.exp * 1000).toLocaleString()}</p>
                                <p><strong>Current Time:</strong> ${new Date().toLocaleString()}</p>
                                <p><strong>Expired:</strong> ${Date.now() > payload.exp * 1000 ? 'Yes' : 'No'}</p>
                            </div>
                        </div>
                    `;
                } catch (error) {
                    resultsDiv.innerHTML = `<p class="text-red-400">❌ Error parsing token: ${error.message}</p>`;
                }
            } else {
                resultsDiv.innerHTML = '<p class="text-gray-400">No token found</p>';
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateDebugInfo();

            // Update debug info every 2 seconds
            setInterval(updateDebugInfo, 2000);
        });
    </script>
</body>
</html>
