<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Terms Library - AutoImage</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="css/optimized.css">
        <link rel="icon" href="images/favicon.png" type="image/png">
        <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#1E40AF',
                        accent: '#F59E0B',
                        success: '#10B981',
                        danger: '#EF4444',
                        dark: '#1F2937',
                        light: '#F9FAFB'
                    }
                }
            }
        }
    </script>
    </head>

    <body class="bg-gray-800 text-gray-200 min-h-screen">

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Page Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-200 mb-2">Terms Library
                </h1>
                <p class="text-gray-400">Browse and manage your AI-generated
                    terms and variables</p>
            </div>

            <!-- Add New Term Section -->
            <div
                class="bg-gray-700 rounded-lg shadow-sm border border-gray-600 p-6 mb-8">
                <h2 class="text-xl font-semibold text-gray-200 mb-4">Add New
                    Term
                </h2>
                <div class="flex space-x-4">
                    <div class="flex-1">
                        <label for="newTerm"
                            class="block text-sm font-medium text-gray-300 mb-2">Term</label>
                        <input type="text" id="newTerm"
                            placeholder="e.g., cat, dog, landscape"
                            class="w-full px-3 py-2 bg-gray-600 border border-gray-500 rounded-md text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div class="flex items-end">
                        <button id="addTerm"
                            class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition-colors font-medium">
                            Add Term
                        </button>
                    </div>
                </div>
            </div>

            <!-- Search Section -->
            <div
                class="bg-gray-700 rounded-lg shadow-sm border border-gray-600 p-6 mb-8">
                <h2 class="text-xl font-semibold text-gray-200 mb-4">Search
                    Terms
                </h2>
                <div class="flex space-x-4">
                    <div class="flex-1">
                        <input type="text" id="searchInput"
                            placeholder="Search terms..."
                            class="w-full px-3 py-2 bg-gray-600 border border-gray-500 rounded-md text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <button id="searchBtn"
                        class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition-colors font-medium">
                        Search
                    </button>
                    <button id="clearSearch"
                        class="bg-gray-500 text-white px-6 py-2 rounded-md hover:bg-gray-600 transition-colors font-medium">
                        Clear
                    </button>
                </div>
                <div id="searchResults" class="mt-4 hidden">
                    <div
                        class="bg-blue-900 border border-blue-700 rounded-md p-4">
                        <h3
                            class="text-sm font-medium text-blue-200 mb-2">Search
                            Results
                        </h3>
                        <div id="searchResultsContent"
                            class="text-sm text-blue-100"></div>
                    </div>
                </div>
            </div>

            <!-- Terms Library -->
            <div
                class="bg-gray-700 rounded-lg shadow-sm border border-gray-600 p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold text-gray-200">Terms
                        Library
                    </h2>
                    <div class="text-sm text-gray-400">
                        Total: <span id="termCount"
                            class="font-medium text-gray-200">0</span>
                    </div>
                </div>

                <div id="termsList" class="space-y-4 flex flex-wrap gap-4">
                    <!-- Terms will be populated here -->
                    <div class="text-center text-gray-400 py-8">
                        <svg class="mx-auto h-12 w-12 text-gray-500" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p class="mt-2">No terms found</p>
                        <p class="text-sm">Add your first term above to get
                            started
                        </p>
                    </div>
                </div>
            </div>

            <!-- Term Details Modal -->
            <div id="termDetailsModal"
                class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
                <div
                    class="bg-gray-800 rounded-lg p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
                    <div class="flex justify-between items-center mb-4">
                        <h3 id="modalTitle"
                            class="text-xl font-semibold text-gray-200">Term
                            Details
                        </h3>
                        <button id="closeModal"
                            class="text-gray-400 hover:text-gray-200">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <div id="modalContent" class="text-gray-300">
                        <!-- Modal content will be populated here -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Loading Overlay -->
        <div id="loadingOverlay"
            class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
            <div class="bg-white rounded-lg p-6 flex items-center space-x-3">
                <div
                    class="animate-spin rounded-full h-6 w-6 border-b-2 border-primary"></div>
                <span class="text-gray-700">Loading...</span>
            </div>
        </div>

        <!-- Success Toast -->
        <div id="successToast"
            class="fixed top-4 right-4 bg-success text-white px-6 py-3 rounded-lg shadow-lg transform translate-x-full transition-transform duration-300 z-50">
            <div class="flex items-center space-x-2">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                        clip-rule="evenodd" />
                </svg>
                <span id="successMessage">Success!</span>
            </div>
        </div>

        <!-- Error Toast -->
        <div id="errorToast"
            class="fixed top-4 right-4 bg-danger text-white px-6 py-3 rounded-lg shadow-lg transform translate-x-full transition-transform duration-300 z-50">
            <div class="flex items-center space-x-2">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                        clip-rule="evenodd" />
                </svg>
                <span id="errorMessage">Error occurred!</span>
            </div>
        </div>

        <!-- Core Scripts -->
        <script src="js/core/constants.js"></script>
        <script src="js/core/utils.js"></script>
        <script src="js/user.js"></script>

        <!-- Header Component -->
        <script src="js/components/header-component.js"></script>

        <!-- Terms Page Specific Script -->
        <script src="js/terms-manager.js"></script>

        <script>
        // Initialize user authentication
        checkUser().then(user => {
            if (user) {
                renderUserUI(user.email);
            }
        });

        // Debug: Check if components are loaded
        window.addEventListener('load', () => {
            console.log('Page loaded, checking components...');

            if (window.headerComponent) {
                console.log('Header component found:', window.headerComponent);
            } else {
                console.error('Header component not found!');
            }

            if (window.termsManager) {
                console.log('Terms manager found:', window.termsManager);
            } else {
                console.error('Terms manager not found!');
            }

            // Check if header element exists
            const header = document.querySelector('header');
            if (header) {
                console.log('Header element found:', header);
            } else {
                console.error('Header element not found!');
            }
        });
    </script>
    </body>

</html>
