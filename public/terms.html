<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add term to Dialogica</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css" />
    <link rel="icon" href="images/favicon.png" type="image/png">
</head>

<body>
    <div class="row space-between">
        <div class="donate-btn">
            <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="nicholasjay" data-color="#FFDD00" data-emoji="☕" data-font="Cookie" data-text="Buy me a coffee" data-outline-color="#000000"
                data-font-color="#000000" data-coffee-color="#ffffff"></script>
        </div>
        <div id="authentication"><a href="/login.html">Login</a> / <a href="/register.html">Register</a></div>
    </div>
    <div class="" style="width:100%;">
        <a href="/">
            <h2 class="title">Home</h2>
        </a>
    </div>

    <section class="term-results">
        <h3>Search Terms</h3>
        <div class="">
            <div class="term-container">
                <input type="text" id="term" placeholder="search">
            </div>
            <button class="find">find</button>
            <button class="clear">clear</button>
        </div>
        <div class="loading hidden">
            <div class="message">Working on it...</div>
        </div>
        <div class="term-results"></div>
    </section>

    <h3>All Terms: <span id="term-count"></span></h3>
    <ul class="word-types"></ul>

    <script src="js/user.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/setup/setupSearchTerm.js"></script>
    <script src="js/setup/setupStatsBar.js"></script>
    <script src="js/setup/setupWordTypeSection.js"></script>
    <script>
        setupSearchTerm();
        setupStatsBar();
        setupWordTypeSection();

        checkUser().then(user => {
            if (user) {
                renderUserUI(user.email);

            }
        });
    </script>
</body>

</html>
