<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Stats Widget Test</title>
    <link rel="stylesheet" href="css/optimized.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-800 text-gray-200 w-full min-h-screen">
    <main class="flex-col gap-4 h-full max-w-[1020px] mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Transaction Stats Widget Test</h1>
        
        <div class="bg-gray-700 p-4 rounded-lg mb-4">
            <h2 class="text-lg font-semibold mb-2">Header Widget Test</h2>
            <p class="text-sm text-gray-400 mb-4">The transaction stats widget should appear in the header above.</p>
            
            <div class="flex items-center space-x-4 text-sm">
                <div id="transaction-stats" class="text-sm">
                    <!-- Transaction stats will be loaded here -->
                </div>
                <div id="authentication" class="text-sm">
                    <span class="text-gray-500 mx-2">/</span>
                    <a href="/register.html" class="text-gray-300 hover:text-blue-400 transition-colors duration-200">
                        Register
                    </a>
                </div>
            </div>
        </div>

        <div class="bg-gray-700 p-4 rounded-lg">
            <h2 class="text-lg font-semibold mb-2">Test Controls</h2>
            <div class="space-y-2">
                <button id="testAuth" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Simulate Login
                </button>
                <button id="testLogout" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                    Simulate Logout
                </button>
                <button id="testRefresh" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                    Refresh Stats
                </button>
                <button id="testGenerate" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
                    Simulate Image Generation
                </button>
            </div>
        </div>
    </main>

    <!-- Header Component -->
    <script src="js/components/header-component.js"></script>

    <!-- Authentication Component -->
    <script src="js/components/auth-component.js"></script>

    <!-- Transaction Stats Component -->
    <script src="js/components/transaction-stats-component.js"></script>

    <!-- Core modules -->
    <script src="js/core/constants.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/api-service.js"></script>

    <script>
        // Test controls
        document.getElementById('testAuth').addEventListener('click', () => {
            // Simulate authentication
            if (window.authComponent) {
                window.authComponent.setUser({
                    id: 'test-user',
                    email: 'test@example.com'
                });
            }
        });

        document.getElementById('testLogout').addEventListener('click', () => {
            // Simulate logout
            if (window.authComponent) {
                window.authComponent.setUser(null);
            }
        });

        document.getElementById('testRefresh').addEventListener('click', () => {
            // Refresh stats
            if (window.transactionStatsComponent) {
                window.transactionStatsComponent.refresh();
            }
        });

        document.getElementById('testGenerate').addEventListener('click', () => {
            // Simulate image generation
            window.dispatchEvent(new CustomEvent('imageGenerated', { 
                detail: { 
                    imageData: {
                        id: 'test-image',
                        url: 'test.jpg',
                        prompt: 'Test prompt'
                    },
                    timestamp: new Date().toISOString()
                }
            }));
        });

        // Mock API service for testing
        if (!window.apiService) {
            window.apiService = {
                get: async (url) => {
                    console.log('Mock API call:', url);
                    // Simulate API response
                    return {
                        success: true,
                        data: {
                            userId: 'test-user',
                            generationCount: Math.floor(Math.random() * 100) + 1,
                            totalCost: (Math.random() * 2).toFixed(3),
                            averageCostPerGeneration: (Math.random() * 0.02).toFixed(3),
                            providerBreakdown: {
                                'dalle': (Math.random() * 0.5).toFixed(3),
                                'flux': (Math.random() * 0.3).toFixed(3)
                            }
                        }
                    };
                }
            };
        }
    </script>
</body>
</html>
