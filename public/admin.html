<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Image Harvest</title>

    <!-- Stylesheets -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/admin.css" rel="stylesheet">

    <!-- Preload critical resources -->
    <link rel="preload" href="js/services/FormGenerator.js" as="script">
    <link rel="preload" href="js/models/AdminModels.js" as="script">

    <!-- SEO and Meta -->
    <meta name="description" content="Admin dashboard for Image Harvest - manage payments, pricing, activity, and users">
    <meta name="robots" content="noindex, nofollow">

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
</head>
<body>
    <!-- Skip Navigation Link for Accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>Loading Admin Dashboard</h2>
            <p>Verifying admin access...</p>
        </div>
    </div>

    <!-- Admin Dashboard Layout -->
    <div id="admin-dashboard" class="admin-dashboard" style="display: none;">

        <!-- Header -->
        <header class="admin-header">
            <div class="header-content">
                <div class="header-left">
                    <h1 class="dashboard-title">
                        <i class="fas fa-shield-alt"></i>
                        Admin Dashboard
                    </h1>
                </div>

                <div class="header-right">
                    <div class="admin-user-info" id="admin-user-info">
                        <span class="admin-badge">
                            <i class="fas fa-crown"></i>
                            Admin
                        </span>
                        <span class="user-email" id="admin-user-email">Loading...</span>
                    </div>

                    <div class="header-actions">
                        <a href="/" class="btn btn-outline" title="Back to Site">
                            <i class="fas fa-home"></i>
                            <span class="btn-text">Site</span>
                        </a>

                        <button id="logout-btn" class="btn btn-outline" title="Logout">
                            <i class="fas fa-sign-out-alt"></i>
                            <span class="btn-text">Logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="admin-layout">

            <!-- Sidebar Navigation -->
            <aside class="admin-sidebar">
                <nav class="sidebar-nav">
                    <div class="nav-header">
                        <h3>Dashboard Sections</h3>
                        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>

                    <ul id="admin-nav" class="nav-list" role="navigation" aria-label="Admin navigation">
                        <!-- Navigation will be populated by JavaScript -->
                    </ul>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main id="main-content" class="admin-main" role="main">

                <!-- Section Container for Payments -->
                <section id="section-payments" class="admin-section" style="display: none;">
                    <!-- Content will be populated by JavaScript -->
                </section>

                <!-- Section Container for Pricing -->
                <section id="section-pricing" class="admin-section" style="display: none;">
                    <!-- Content will be populated by JavaScript -->
                </section>

                <!-- Section Container for Activity -->
                <section id="section-activity" class="admin-section" style="display: none;">
                    <!-- Content will be populated by JavaScript -->
                </section>

                <!-- Section Container for Users -->
                <section id="section-users" class="admin-section" style="display: none;">
                    <!-- Content will be populated by JavaScript -->
                </section>

            </main>
        </div>
    </div>

    <!-- Error Screen -->
    <div id="error-screen" class="error-screen" style="display: none;">
        <div class="error-content">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h2>Access Denied</h2>
            <p id="error-message">You do not have permission to access the admin dashboard.</p>
            <div class="error-actions">
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home"></i>
                    Return to Home
                </a>
                <button id="retry-btn" class="btn btn-outline">
                    <i class="fas fa-refresh"></i>
                    Try Again
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Container for Forms and Dialogs -->
    <div id="modal-container" class="modal-container" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button id="modal-close" class="modal-close" aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notification-container" class="notification-container">
        <!-- Notifications will be populated by JavaScript -->
    </div>

    <!-- JavaScript Dependencies -->
    <script>
        // Global configuration
        window.ADMIN_CONFIG = {
            apiBaseUrl: '/api/admin',
            maxRetries: 3,
            cacheTimeout: 5 * 60 * 1000, // 5 minutes
            refreshInterval: 30 * 1000    // 30 seconds
        };
    </script>

    <!-- Core Services -->
    <script src="js/services/api-service.js"></script>
    <script src="js/services/FormGenerator.js"></script>

    <!-- Models and Configuration -->
    <script src="js/models/AdminModels.js"></script>

    <!-- Modular Admin System -->
    <script src="js/modules/admin/admin-constants.js"></script>
    <script src="js/modules/admin/admin-dom-manager.js"></script>
    <script src="js/modules/admin/admin-api-manager.js"></script>
    <script src="js/modules/admin/admin-ui-manager.js"></script>
    <script src="js/modules/admin/admin-section-manager-refactored.js"></script>

    <!-- Legacy Admin Manager (for backward compatibility) -->
    <!-- <script src="js/services/AdminSectionManager.js"></script> -->

    <!-- Chart.js for activity metrics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Main Admin Application -->
    <script src="js/admin.js"></script>

    <!-- Error Monitoring -->
    <script>
        // Global error handling for admin dashboard
        window.addEventListener('error', (event) => {
            console.error('Admin Dashboard Error:', event.error);

            // Show user-friendly error notification
            if (window.showNotification) {
                window.showNotification('An unexpected error occurred. Please refresh the page.', 'error');
            }
        });

        // Unhandled promise rejection monitoring
        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled Promise Rejection:', event.reason);

            if (window.showNotification) {
                window.showNotification('A network error occurred. Please check your connection.', 'error');
            }
        });
    </script>
</body>
</html>
